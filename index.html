</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">Team Crazy Grandma</a>
  <div class="nav-links">
    <a href="index.html" class="active">首頁</a>
    <a href="legs.html">棒次表</a>
    <a href="checklist.html">清單</a>
    <a href="notes.html">注意事項</a>
    <a href="training.html">訓練建議</a>
    <a href="info.html">官方資訊</a>
    <a href="meeting.html">行前會議</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">2026 · CRUFU RUN · 北臺灣站</div>
  <h1>2026 北夸父<br><span class="highlight">我阿嬤都跑比你快</span></h1>
  <div class="hero-en">2026 Crufu Team Crazy Grandma</div>
  <div class="hero-stats">
    <div class="hero-stat"><div class="val">202<span>km</span></div><div class="lbl">總里程</div></div>
    <div class="hero-stat"><div class="val">30<span>棒</span></div><div class="lbl">接力棒次</div></div>
    <div class="hero-stat"><div class="val">10<span>人</span></div><div class="lbl">隊員</div></div>
    <div class="hero-stat"><div class="val">~30<span>hr</span></div><div class="lbl">預計時長</div></div>
  </div>
</div>

<div class="container">

  <!-- A車跑者 -->
  <div class="section-title"><span class="badge badge-car-a">A車</span> 崧・宜臻・溫泉・勳・浩安</div>
  <div class="grid" id="grid-car-a"></div>

  <!-- B車跑者 -->
  <div class="section-title"><span class="badge badge-car-b">B車</span> June・Dean・鍾誠・凱欣・凱</div>
  <div class="grid" id="grid-car-b"></div>


</div>

<div class="footer">
  <div>北夸父隊・10人30棒・加油！</div>
  <a href="legs.html">查看棒次表</a>
</div>

<script src="data.js"></script>
<script>
// 跑者快速卡片
function renderRunnerGrid(car, containerId) {
  const el = document.getElementById(containerId);
  RUNNERS.filter(r => r.car === car).forEach(r => {
    const cls = car === 'A' ? 'car-a' : 'car-b';
    const initials = r.name.charAt(0);
    el.insertAdjacentHTML('beforeend', `
      <div class="mini-runner-card">
        <div class="mini-avatar badge-${cls}">${initials}</div>
        <div class="mini-runner-info">
          <div class="mini-runner-name">${r.name}</div>
          <div class="mini-runner-legs">棒 ${r.legs.join('、')}｜${r.km} km｜↑${r.up} m</div>
        </div>
        <span class="badge badge-${cls}">${car}車</span>
      </div>
    `);
  });
}
renderRunnerGrid('A', 'grid-car-a');
renderRunnerGrid('B', 'grid-car-b');

</script>
</body>
</html>
